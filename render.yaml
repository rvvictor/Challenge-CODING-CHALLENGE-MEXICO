services:
  - type: web
    name: bitcoin-arbitrage-sentinel
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && npm --prefix frontend ci && npm --prefix frontend run build
    startCommand: python -m backend.app.main
    envVars:
      - key: MARKET_MODE
        value: auto
      - key: AUTO_EXECUTION
        value: "true"
